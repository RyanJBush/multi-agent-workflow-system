services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env.example
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./workflows.db
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 20s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"

      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Store the SQLite file inside the named volume so it persists across
      # container restarts. This overrides the DATABASE_URL in .env.
      - DATABASE_URL=sqlite+aiosqlite:///./data/workflows.db
    volumes:
      - db_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # VITE_API_BASE_URL is baked into the JS bundle at build time and is
        # resolved by the user's browser, not by the frontend container itself.
        # Because port 8000 is published to the host, http://localhost:8000
        # is reachable from any browser running on the same machine.
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
